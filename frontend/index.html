<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Monitor Dashboard</title>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: #0d1117; 
      color: #e6edf3; 
      padding: 24px;
    }
    h1 { 
      font-size: 20px; 
      color: #58a6ff; 
      margin-bottom: 24px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 12px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
    }
    .stat-card .label { 
      font-size: 12px; 
      color: #8b949e; 
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-card .value { 
      font-size: 28px; 
      font-weight: 700; 
      color: #58a6ff;
      margin-top: 8px;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .chart-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
    }
    .chart-card h3 { 
      font-size: 13px; 
      color: #8b949e; 
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .top-ips { list-style: none; }
    .top-ips li {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 13px;
    }
    .top-ips li .ip { color: #79c0ff; font-family: monospace; }
    .top-ips li .count { color: #56d364; }
    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #56d364;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <h1><span class="live-dot"></span>Network Monitor Dashboard</h1>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Total Packets</div>
      <div class="value" id="total-packets">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Bandwidth</div>
      <div class="value" id="total-bytes">0 KB</div>
    </div>
    <div class="stat-card">
      <div class="label">Protocols Detected</div>
      <div class="value" id="proto-count">0</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Protocol Distribution</h3>
      <canvas id="protoChart" height="200"></canvas>
    </div>
    <div class="chart-card">
      <h3>Top Source IPs</h3>
      <ul class="top-ips" id="top-ips"></ul>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
